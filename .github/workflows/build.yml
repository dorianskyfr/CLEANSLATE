name: Build & Publish CleanSlate

# Compile, teste et publie l'exécutable unique sur Windows.
# L'artefact CleanSlate.exe est téléchargeable depuis l'onglet "Actions" de GitHub
# (résumé du run → section "Artifacts"), sans avoir de machine Windows sous la main.

on:
  push:
    branches:
      - main
      - "claude/**"
    tags:
      - "v*" # un tag vX.Y.Z déclenche la publication d'une Release
  pull_request:
  workflow_dispatch: # permet un lancement manuel depuis l'onglet Actions
    inputs:
      release_version:
        description: "Numéro de version pour la Release (ex. v0.1). Laisser vide pour ne pas créer de Release."
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation du SDK .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restauration des dépendances
        run: dotnet restore CleanSlate.sln

      - name: Compilation (Release)
        run: dotnet build CleanSlate.sln -c Release --no-restore

      - name: Tests unitaires
        run: dotnet test CleanSlate.sln -c Release --no-build --verbosity normal

      - name: Publication en un seul .exe autonome
        run: dotnet publish src/CleanSlate.App -c Release -p:PublishProfile=SingleFile

      - name: Téléversement de l'artefact (CleanSlate.exe)
        uses: actions/upload-artifact@v4
        with:
          name: CleanSlate-win-x64
          path: src/CleanSlate.App/bin/Release/net8.0-windows/win-x64/publish/CleanSlate.exe
          if-no-files-found: error

  # Publication d'une Release GitHub avec le .exe attaché, déclenchée uniquement
  # par un tag « v* » (ex. v0.1). Ne s'exécute que si le build/les tests passent.
  release:
    needs: build
    # TEMPORAIRE : déclenchement aussi sur push main pour publier v1.0.0 (tag/dispatch indisponibles)
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_version != '') || github.ref == 'refs/heads/main'
    runs-on: windows-latest
    permissions:
      contents: write # nécessaire pour créer la Release et y attacher des fichiers
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation du SDK .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publication en un seul .exe autonome
        run: dotnet publish src/CleanSlate.App -c Release -p:PublishProfile=SingleFile

      - name: Génération des notes de version depuis CHANGELOG.md
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_version || 'v1.0.0' }}
        run: |
          $version = $env:RELEASE_VERSION
          $versionNum = $version.TrimStart('v')
          $changelog = Get-Content -Raw -Path CHANGELOG.md
          $pattern = '(?ms)^## v' + [regex]::Escape($versionNum) + '[ \t]*\r?\n(.*?)\r?\n---'
          $match = [regex]::Match($changelog, $pattern)
          $notes = if ($match.Success) { $match.Groups[1].Value.Trim() } else { '' }

          $lines = @(
            "## CleanSlate $version"
            ''
            "Utilitaire d'optimisation et de nettoyage PC pour Windows 10/11 (64 bits)."
            ''
            '### Téléchargement'
            '**`CleanSlate.exe`** ci-dessous : exécutable **unique et autonome**'
            '(runtime .NET 8 + WPF inclus). Aucune installation requise — double-cliquez.'
            ''
            '> ⚠️ Comme tout exécutable non signé, Windows SmartScreen peut afficher'
            '> un avertissement au premier lancement (« Informations complémentaires »'
            '> → « Exécuter quand même »).'
            ''
            $notes
          )
          ($lines -join "`n") | Set-Content -Path release_body.md -Encoding utf8

      - name: Création de la Release et envoi du .exe
        uses: softprops/action-gh-release@v2
        with:
          name: CleanSlate ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_version || 'v1.0.0' }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_version || 'v1.0.0' }}
          generate_release_notes: false
          files: src/CleanSlate.App/bin/Release/net8.0-windows/win-x64/publish/CleanSlate.exe
          body_path: release_body.md
