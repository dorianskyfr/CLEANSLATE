name: Build & Publish CleanSlate

# Compile, teste et publie l'exécutable unique sur Windows.
# L'artefact CleanSlate.exe est téléchargeable depuis l'onglet "Actions" de GitHub
# (résumé du run → section "Artifacts"), sans avoir de machine Windows sous la main.

on:
  push:
    branches:
      - main
      - "claude/**"
    tags:
      - "v*" # un tag vX.Y.Z déclenche la publication d'une Release
  pull_request:
  workflow_dispatch: # permet un lancement manuel depuis l'onglet Actions
    inputs:
      release_version:
        description: "Numéro de version pour la Release (ex. v0.1). Laisser vide pour ne pas créer de Release."
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation du SDK .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restauration des dépendances
        run: dotnet restore CleanSlate.sln

      - name: Compilation (Release)
        run: dotnet build CleanSlate.sln -c Release --no-restore

      - name: Tests unitaires
        run: dotnet test CleanSlate.sln -c Release --no-build --verbosity normal

      - name: Publication en un seul .exe autonome
        run: dotnet publish src/CleanSlate.App -c Release -p:PublishProfile=SingleFile

      - name: Téléversement de l'artefact (CleanSlate.exe)
        uses: actions/upload-artifact@v4
        with:
          name: CleanSlate-win-x64
          path: src/CleanSlate.App/bin/Release/net8.0-windows/win-x64/publish/CleanSlate.exe
          if-no-files-found: error

  # Publication d'une Release GitHub avec le .exe attaché, déclenchée uniquement
  # par un tag « v* » (ex. v0.1). Ne s'exécute que si le build/les tests passent.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_version != '')
    runs-on: windows-latest
    permissions:
      contents: write # nécessaire pour créer la Release et y attacher des fichiers
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation du SDK .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publication en un seul .exe autonome
        run: dotnet publish src/CleanSlate.App -c Release -p:PublishProfile=SingleFile

      - name: Génération des notes de version depuis CHANGELOG.md
        shell: pwsh
        env:
          VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_version }}
        run: |
          $version = $env:VERSION
          $changelog = [System.IO.File]::ReadAllText("CHANGELOG.md")
          $escaped = [regex]::Escape($version)
          $notes = ""
          if ($changelog -match "(?ms)^## $escaped\s*[\r\n]+(.*?)[\r\n]+---") {
            $notes = $Matches[1].Trim()
          }
          $header  = "## CleanSlate $version`r`n`r`n"
          $header += "Utilitaire d'optimisation et de nettoyage PC pour Windows 10/11 (64 bits).`r`n`r`n"
          $header += "### Téléchargement`r`n"
          $header += '**`CleanSlate.exe`** ci-dessous : exécutable **unique et autonome**' + "`r`n"
          $header += "(runtime .NET 8 + WPF inclus). Aucune installation requise — double-cliquez.`r`n`r`n"
          $header += "> ⚠️ Comme tout exécutable non signé, Windows SmartScreen peut afficher`r`n"
          $header += "> un avertissement au premier lancement (« Informations complémentaires »`r`n"
          $header += "> → « Exécuter quand même »).`r`n`r`n"
          if ($notes) {
            $header += "### Nouveautés $version`r`n`r`n$notes`r`n"
          }
          [System.IO.File]::WriteAllText("release_body.md", $header, [System.Text.Encoding]::UTF8)

      - name: Création de la Release et envoi du .exe
        uses: softprops/action-gh-release@v2
        with:
          name: CleanSlate ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_version }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_version }}
          body_path: release_body.md
          files: src/CleanSlate.App/bin/Release/net8.0-windows/win-x64/publish/CleanSlate.exe
